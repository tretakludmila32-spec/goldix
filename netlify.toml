[build]
  publish = "dist"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# API — функції мають пріоритет над SPA fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA fallback для React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
