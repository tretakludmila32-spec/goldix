[build]
  publish = "dist"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback — усі не-API шляхи ведуть на index.html для React-роутинга
# ВАЖЛИВО: /api/* обробляється serverless functions (див. in-code config path)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
